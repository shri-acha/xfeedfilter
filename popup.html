<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Feed Filter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #1e1e2e;
      --accent:   #6ef0c8;
      --accent2:  #a78bfa;
      --danger:   #f87171;
      --text:     #e2e2f0;
      --muted:    #6b6b8a;
      --radius:   10px;
    }

    body {
      width: 360px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      padding: 0;
      overflow: hidden;
    }

    /* Animated mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 200px 140px at 10% 20%, rgba(110, 240, 200, 0.07) 0%, transparent 70%),
        radial-gradient(ellipse 160px 160px at 90% 80%, rgba(167, 139, 250, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .toggle-row:hover { border-color: var(--accent); }

    .toggle-label {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
    }

    .toggle-status {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      transition: color 0.2s;
    }

    .toggle-status.on { color: var(--accent); }

    /* The switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input { display: none; }

    .switch-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .switch-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.25s, background 0.25s;
    }

    input:checked + .switch-track {
      background: rgba(110, 240, 200, 0.2);
      border: 1px solid var(--accent);
    }

    input:checked + .switch-track::after {
      transform: translateX(18px);
      background: var(--accent);
    }

    /* Sections */
    .section-label {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1.2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* Input */
    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
    }

    input::placeholder { color: var(--muted); }

    /* Keywords area */
    .keywords-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      min-height: 54px;
      cursor: text;
      transition: border-color 0.2s;
    }

    .keywords-box:focus-within {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
    }

    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(110, 240, 200, 0.1);
      border: 1px solid rgba(110, 240, 200, 0.25);
      color: var(--accent);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      animation: tagIn 0.15s ease;
    }

    @keyframes tagIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .tag-remove {
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      transition: color 0.15s;
    }
    .tag-remove:hover { color: var(--danger); }

    .tag-input {
      border: none;
      background: transparent;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      min-width: 80px;
      flex: 1;
      padding: 2px 0;
    }

    .tag-hint {
      font-size: 9px;
      color: var(--muted);
      margin-top: 3px;
      font-family: 'DM Mono', monospace;
    }

    /* Mode selector */
    .mode-row {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      flex: 1;
      padding: 6px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      line-height: 1.4;
    }

    .mode-btn.active {
      border-color: var(--accent2);
      background: rgba(167, 139, 250, 0.12);
      color: var(--accent2);
    }

    /* Save button */
    .save-btn {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: var(--radius);
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .save-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); }

    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      min-height: 30px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    .status-dot.error { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .status-text { flex: 1; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -16px;
    }

    /* API key row */
    .api-row {
      position: relative;
    }

    .api-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: color 0.2s;
    }
    .api-toggle:hover { color: var(--text); }

    .api-row input { padding-right: 36px; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">✦</div>
        <div>
          <div class="logo-text">X Feed Filter</div>
        </div>
      </div>
    </div>

    <!-- Enable Toggle -->
    <label class="toggle-row" for="enableToggle">
      <span class="toggle-label">Filter Feed</span>
      <span class="toggle-status" id="toggleStatus">OFF</span>
      <div class="switch">
        <input type="checkbox" id="enableToggle" />
        <div class="switch-track"></div>
      </div>
    </label>

    <!-- Provider -->
    <div>
      <div class="section-label">AI Provider</div>
      <div class="mode-row">
        <button class="mode-btn active" data-provider="gemini" id="providerGeminiBtn">
          ✦ Gemini<br><span style="font-weight:400;color:var(--muted)">Free tier</span>
        </button>
        <button class="mode-btn" data-provider="openai" id="providerOpenAIBtn">
          ⬡ OpenAI<br><span style="font-weight:400;color:var(--muted)">Paid API</span>
        </button>
      </div>
    </div>

    <!-- API Key (label updates dynamically) -->
    <div>
      <div class="section-label" id="apiKeyLabel">Gemini API Key</div>
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
        <button class="api-toggle" id="apiToggle" title="Show/hide key">👁</button>
      </div>
    </div>

    <!-- OpenAI Model (hidden when Gemini selected) -->
    <div id="openaiModelRow" style="display:none">
      <div class="section-label">OpenAI Model</div>
      <div class="mode-row">
        <button class="mode-btn active" data-model="gpt-4o-mini" id="modelMiniBtn">
          gpt-4o-mini<br><span style="font-weight:400;color:var(--muted)">Fast · cheap</span>
        </button>
        <button class="mode-btn" data-model="gpt-4o" id="modelFullBtn">
          gpt-4o<br><span style="font-weight:400;color:var(--muted)">Best quality</span>
        </button>
      </div>
    </div>

    <!-- Keywords -->
    <div>
      <div class="section-label">Filter Keywords</div>
      <div class="keywords-box" id="keywordsBox">
        <div class="tag-container" id="tagContainer">
          <input type="text" class="tag-input" id="tagInput" placeholder="Type keyword + Enter…" />
        </div>
      </div>
      <div class="tag-hint">Press Enter or comma to add. Tweets matching ANY keyword are kept.</div>
    </div>

    <!-- Filter Mode -->
    <div>
      <div class="section-label">Filter Mode</div>
      <div class="mode-row">
        <button class="mode-btn active" data-mode="semantic" id="modeSemanticBtn">
          🧠 Semantic<br><span style="font-weight:400;color:var(--muted)">AI understands</span>
        </button>
        <button class="mode-btn" data-mode="exact" id="modeExactBtn">
          🔍 Exact Match<br><span style="font-weight:400;color:var(--muted)">No API needed</span>
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Status -->
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Configure settings and save to begin.</span>
    </div>

    <!-- Save -->
    <button class="save-btn" id="saveBtn">Save & Apply →</button>

  </div>

  <script src="popup.js"></script>
</body>
</html>
